<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <title>PRONOW TENNIS CLUB</title>

  <!-- PWA: 홈 화면 설치 / 전체화면 앱 실행 -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="테니스대진" />

  <!-- Pretendard (한국 모던 웹 표준 폰트) -->
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header class="appbar">
      <div class="appbar-inner">
        <div class="brand">
          <span class="brand-mark">🎾</span>
          <div class="brand-text">
            <strong>PRONOW TENNIS CLUB</strong>
            <span id="room-name" class="muted small">우리 클럽</span>
          </div>
        </div>
        <div class="appbar-actions">
          <button id="account-btn" class="icon-btn" title="로그인 / 회원가입" style="display:none">👤</button>
          <button id="share-btn" class="icon-btn" title="공유">🔗</button>
          <button id="import-btn" class="icon-btn" title="불러오기">📂</button>
          <button id="export-btn" class="icon-btn" title="내보내기(백업)">💾</button>
          <button id="reset-btn" class="icon-btn" title="설정">⚙️</button>
        </div>
      </div>
      <nav id="tabbar" class="tabbar"></nav>
      <div id="club-bar" class="club-bar"></div>
    </header>

    <main id="content" class="content"><!-- 화면 렌더 --></main>

    <footer class="appfoot">
      <span id="mode-label" class="muted small">로컬 저장 모드 · 이 기기에만 저장됩니다</span>
    </footer>
  </div>

  <div id="modal-root"></div>

  <!-- Supabase SDK (실시간 공유용, 옵션). 미설정 시 무해. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- 설정 (실시간 공유 키). 비어 있으면 로컬 모드. -->
  <script src="config.js?v=r45"></script>

  <!-- 순서 중요: 의존성 → 상태 → 알고리즘 → 클라우드 → UI → 진입점 -->
  <script src="js/storage.js?v=r45"></script>
  <script src="js/state.js?v=r45"></script>
  <script src="js/draw.js?v=r45"></script>
  <script src="js/ranking.js?v=r45"></script>
  <script src="js/supabase.js?v=r45"></script>
  <script src="js/sync.js?v=r45"></script>
  <script src="js/excel.js?v=r45"></script>
  <script src="js/email.js?v=r45"></script>
  <script src="js/ui/members.js?v=r45"></script>
  <script src="js/ui/attendance.js?v=r45"></script>
  <script src="js/ui/attendees.js?v=r45"></script>
  <script src="js/ui/draw.js?v=r45"></script>
  <script src="js/ui/ranking.js?v=r45"></script>
  <script src="js/ui/history.js?v=r45"></script>
  <script src="js/ui/signup.js?v=r45"></script>
  <script src="js/app.js?v=r45"></script>
</body>
</html>
